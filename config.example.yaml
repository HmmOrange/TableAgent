table_agent:
  phase: "all"
  structure_cache_dir: "cache/table_agent/structure"
  artifact_root: "outputs/table_agent/artifacts"
  evaluation_output_dir: "outputs"
  log_dir: "outputs/table_agent/logs"
  run_dir_template: "{run_name}"
  repeat_dir_template: "repeat_{run_id}"
  shared_dir_name: "shared"
  artifact_dir: "outputs/table_agent"
  max_refinement_rounds: 3
  max_context_chars: 60000
  image_scale: 2.0
  render_backend: "pillow"
  render_timeout_seconds: 60
  libreoffice_path: null
  libreoffice_image_resolution: 600
  workbook_show_coordinates: true
  generation_max_tokens: 8192
  max_image_dimension: 8192
  max_viewport_width: 4096
  max_viewport_height: 4096
  max_image_pixels: 33554432
  image_tile_size: null
  image_tile_overlap: 256
  run_retrieval: true
  retrieval_rerank_with_llm: true
  retrieval_top_k: 5
  retrieval_candidate_max_chars: 4000
  exstruct_mode: "light"
  viewport_rows: 50
  viewport_columns: 50
  shift_cells: 45
  max_retry: 3
  qa_max_retries: 3
  qa_max_experience_records: 5
  qa_log_path: null
  qa_max_observation_chars: 2000
  qa_max_error_chars: 2000
  qa_max_value_repr_chars: 800
  retrieval_embedding_provider: null
  retrieval_lexical_weight: 0.5
  retrieval_embedding_weight: 0.5

